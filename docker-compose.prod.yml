version: '3.9'

services:
  # =======================
  # Nginx - Reverse Proxy
  # =======================
  nginx:
    image: nginx:alpine
    container_name: hination_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - hination_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =======================
  # Frontend - Next.js
  # =======================
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
      target: production
    container_name: hination_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://ecombay.online/api
    ports:
      - "3100:3100"
    networks:
      - hination_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =======================
  # Backend - Express API
  # =======================
  backend:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    container_name: hination_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - "4000:4000"
    networks:
      - hination_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =======================
  # Worker - RabbitMQ Consumer (Multiple replicas)
  # =======================
  worker:
    build:
      context: ./docker/worker
      dockerfile: Dockerfile
    container_name: hination_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - hination_network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 1G

  # =======================
  # PostgreSQL Database
  # =======================
  postgres:
    image: postgres:16-alpine
    container_name: hination_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hination
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=hination
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - hination_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hination -d hination"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =======================
  # Redis Cache
  # =======================
  redis:
    image: redis:7-alpine
    container_name: hination_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - hination_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =======================
  # RabbitMQ Message Queue
  # =======================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hination_rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_DEFAULT_VHOST=/
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hination_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

# =======================
# Networks
# =======================
networks:
  hination_network:
    driver: bridge
    name: hination_network

# =======================
# Volumes
# =======================
volumes:
  postgres_data:
    name: hination_postgres_data_prod
  redis_data:
    name: hination_redis_data_prod
  rabbitmq_data:
    name: hination_rabbitmq_data_prod
  nginx_logs:
    name: hination_nginx_logs_prod
